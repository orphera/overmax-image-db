name: Build Image DB

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      force_all:
        description: '전체 재빌드 (기존 항목 포함)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 이전 릴리즈의 image_index.db를 가져와서 증분 빌드에 활용
          fetch-depth: 1

      - name: Get latest overmax commit hash
        id: overmax-hash
        run: |
          HASH=$(git ls-remote https://github.com/orphera/overmax.git HEAD | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Cache db-builder binary
        id: cache-db-builder
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/db_builder
          key: ${{ runner.os }}-db-builder-${{ steps.overmax-hash.outputs.hash }}

      - name: Install Rust toolchain
        if: steps.cache-db-builder.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install db-builder via Cargo
        if: steps.cache-db-builder.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/orphera/overmax.git --bin db_builder

      - name: Add cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest image_index.db (for incremental build)
        if: ${{ !inputs.force_all }}
        continue-on-error: true   # 첫 빌드이거나 릴리즈가 없으면 스킵
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --pattern "image_index.db" --dir . || true
          if [ -f image_index.db ]; then
            echo "기존 DB 다운로드 완료"
          else
            echo "기존 DB 없음 - 전체 빌드"
          fi

      - name: Build image_index.db
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force_all }}" = "true" ]; then
            FORCE_FLAG="--force-all"
          fi
          python scripts/build_image_db.py --db-path image_index.db $FORCE_FLAG

      - name: Check changes
        id: changes
        run: |
          if [ -f no_changes ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate tag
        id: tag
        if: steps.changes.outputs.changed == 'true'
        run: |
          DATE=$(date +'%Y.%m.%d')

          LIST=$(gh release list --limit 100 | awk '{print $1}' | grep "^$DATE" || true)

          if [ -z "$LIST" ]; then
            IDX=0
          else
            IDX=$(echo "$LIST" | sed "s/^$DATE\.//" | sort -n | tail -n1)
            IDX=$((IDX+1))
          fi

          TAG="${DATE}.${IDX}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: steps.changes.outputs.changed == 'true'
        run: |
          TAG="v${{ steps.tag.outputs.tag }}"

          gh release create "$TAG" \
            image_index.db \
            --title "Image DB $TAG" \
            --notes-file release_notes.md \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}